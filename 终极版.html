<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>声动虔城 · 赣州音乐节H5</title>
  <style>
    :root {
      --bg:#03010a;
      --bg-soft:#0f0b1f;
      --card:rgba(15,12,30,0.7);
      --line:rgba(255,255,255,0.08);
      --text:rgba(255,255,255,0.96);
      --text-soft:rgba(255,255,255,0.68);
      --text-faint:rgba(255,255,255,0.42);
      --purple:#c084fc;
      --pink:#f472b6;
      --blue:#38bdf8;
      --cyan:#67e8f9;
      --glow:0 16px 48px rgba(0,0,0,0.28);
      --radius-xl:32px;
      --radius-lg:24px;
      --radius-md:18px;
      --page-dur:900ms;
      --ease:cubic-bezier(0.22, 0.95, 0.36, 1);
    }

    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:"SF Pro Text",-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;}
    body{
      background:
        radial-gradient(circle at 20% 18%, rgba(139,92,246,0.22), transparent 32%),
        radial-gradient(circle at 85% 80%, rgba(34,211,238,0.12), transparent 38%),
        linear-gradient(180deg,#06020f 0%,#03010a 100%);
    }
    button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;}
    button:focus,button:focus-visible{outline:none;box-shadow:none;}

    .app{position:relative;width:100%;height:100%;overflow:hidden;}
    .app::before{
      content:"";position:absolute;inset:0;pointer-events:none;
      background:linear-gradient(180deg, rgba(255,255,255,0.025), transparent 18%, transparent 82%, rgba(255,255,255,0.03));
      z-index:2;
    }

    .pages{width:100%;height:100%;transition:transform var(--page-dur) var(--ease);will-change:transform;}
    .page{
      height:100vh; width:100%; display:flex; align-items:center; justify-content:center;
      padding:24px 20px; position:relative;
      transition:opacity 650ms ease, transform 760ms var(--ease), filter 600ms ease;
      transform-origin:center center;
    }
    .page.is-before,.page.is-after{opacity:.22;filter:blur(5px);transform:translateY(28px) scale(.97);}
    .page.is-active{opacity:1;filter:none;transform:none;}

    .mobile-frame{width:min(430px,100%);margin:0 auto;position:relative;z-index:3;}
    .section-title{margin-bottom:28px;position:relative;}
    .eyebrow{font-size:11px;letter-spacing:.38em;text-transform:uppercase;background:linear-gradient(135deg,var(--purple),#60a5fa);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:12px;display:inline-block;}
    .title{font-size:32px;line-height:1.18;font-weight:760;letter-spacing:-.02em;background:linear-gradient(135deg,#fff,#e9e7ff 60%,#bfdbfe);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .subtitle{margin-top:12px;font-size:14px;line-height:1.7;color:var(--text-soft);}
    .transition-line{text-align:center;color:rgba(255,255,255,.52);font-size:13px;line-height:1.75;margin-bottom:20px;position:relative;padding-bottom:14px;}
    .transition-line::after{content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:76px;height:2px;border-radius:999px;background:linear-gradient(90deg, rgba(192,132,252,0), rgba(192,132,252,.75), rgba(96,165,250,.78), rgba(192,132,252,0));}

    .card{
      border:1px solid var(--line);
      background:var(--card);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border-radius:var(--radius-xl);
      box-shadow:var(--glow);
    }

    .dot-nav{position:fixed;right:14px;top:50%;transform:translateY(-50%);z-index:20;display:flex;flex-direction:column;gap:10px;}
    .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.32);transition:all .25s ease;}
    .dot.active{background:var(--purple);box-shadow:0 0 12px rgba(192,132,252,.7);transform:scale(1.22);}

    .music-control,.page-counter{
      position:fixed;z-index:30;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.16);background:rgba(5,5,12,.4);
    }
    .music-control{left:20px;bottom:20px;width:48px;height:48px;border-radius:50%;display:grid;place-items:center;transition:transform .25s ease, box-shadow .25s ease, background .25s ease;}
    .music-control.playing{box-shadow:0 0 20px rgba(192,132,252,.22);background:rgba(18,12,36,.6);}
    .music-control.playing .music-icon{animation:spinSlow 3.5s linear infinite;}
    .music-icon{font-size:20px;display:inline-flex;align-items:center;justify-content:center;}
    .page-counter{right:20px;bottom:20px;min-width:76px;padding:10px 14px;border-radius:999px;font-size:12px;color:var(--text-soft);text-align:center;}
    @keyframes spinSlow{to{transform:rotate(360deg);}}

    .btn-row,.seg-wrap,.impact-legend-row{display:flex;gap:10px;flex-wrap:wrap;}
    .chip,.seg-btn,.impact-phase,.map-btn,.reason-btn,.timeline-btn,.ghost-btn{
      transition:transform .22s ease, border-color .22s ease, background .22s ease, box-shadow .22s ease, color .22s ease;
    }
    .chip{
      padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
      font-size:13px;color:var(--text-soft);
    }
    .chip.active,.seg-btn.active,.impact-phase.active,.map-btn.active{
      background:linear-gradient(135deg, rgba(192,132,252,.2), rgba(56,189,248,.14));
      border-color:rgba(192,132,252,.42);
      color:#fff;box-shadow:0 10px 24px rgba(168,85,247,.18);
      transform:translateY(-1px);
    }

    .cover-new{
      min-height:80vh;border-radius:40px;padding:32px 24px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;
      background:linear-gradient(165deg,#0b0620 0%,#05020c 100%);border:1px solid rgba(255,255,255,.12);
    }
    .bg-glow{position:absolute;inset:-18%;background:radial-gradient(circle at 28% 22%, rgba(139,92,246,.26), transparent 34%),radial-gradient(circle at 72% 78%, rgba(34,211,238,.2), transparent 42%);pointer-events:none;}
    .floating-particles{position:absolute;inset:0;pointer-events:none;}
    .particle{position:absolute;background:radial-gradient(circle, rgba(255,215,150,.65), transparent 72%);border-radius:50%;animation:floatParticle var(--dur,8s) ease-in-out infinite;animation-delay:var(--delay,0s);}
    @keyframes floatParticle{0%,100%{transform:translate3d(0,0,0) scale(.92);opacity:.18}50%{transform:translate3d(18px,-28px,0) scale(1.12);opacity:.62}}
    .lanterns-new{position:absolute;top:8%;left:0;right:0;display:flex;justify-content:space-around;padding:0 20px;z-index:1;}
    .lantern{display:flex;flex-direction:column;align-items:center;animation:sway 3.2s ease-in-out infinite;animation-delay:var(--delay,0s)}
    .lantern-string{width:1px;height:18px;background:rgba(255,255,255,.22)}
    .lantern-body{width:32px;height:40px;background:linear-gradient(135deg,#f59e0b,#dc2626);border-radius:50% 50% 40% 40%;box-shadow:0 0 20px rgba(245,158,11,.52);position:relative;}
    .lantern-body::before,.lantern-body::after{content:"";position:absolute;left:50%;transform:translateX(-50%);background:rgba(255,235,190,.7);}
    .lantern-body::before{top:8px;width:18px;height:2px;border-radius:999px;}
    .lantern-body::after{bottom:-4px;width:10px;height:6px;border-radius:0 0 8px 8px;}
    @keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
    .river-wave{position:absolute;left:-5%;right:-5%;bottom:82px;height:54px;background:radial-gradient(ellipse at center, rgba(56,189,248,.16), transparent 65%);filter:blur(10px);animation:riverDrift 6s ease-in-out infinite;}
    @keyframes riverDrift{0%,100%{transform:translateX(-10px)}50%{transform:translateX(14px)}}
    .city-silhouette{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:flex-end;justify-content:center;gap:7px;padding:0 14px 16px;opacity:.92;}
    .building{background:linear-gradient(180deg, rgba(85,75,120,.92), rgba(16,11,32,.95));border-radius:8px 8px 0 0;position:relative;animation:rise .85s var(--ease) both;}
    .building::before{content:"";position:absolute;inset:8px 4px auto 4px;height:42%;background:repeating-linear-gradient(180deg, rgba(255,215,110,.24) 0 4px, transparent 4px 9px), repeating-linear-gradient(90deg, rgba(255,215,110,.24) 0 3px, transparent 3px 7px);opacity:.55;}
    @keyframes rise{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
    .cover-content-new{position:relative;z-index:2;padding-top:120px;display:flex;flex-direction:column;min-height:68vh;justify-content:flex-end;}
    .cover-kicker-new{font-size:12px;letter-spacing:.45em;color:rgba(255,255,255,.52);margin-bottom:14px;}
    .cover-title-new{font-size:56px;line-height:1;font-weight:860;letter-spacing:-.05em;background:linear-gradient(135deg,#fff,#f5d0fe 50%,#7dd3fc);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .cover-sub-new{font-size:18px;margin-top:14px;color:rgba(255,255,255,.86)}
    .cover-desc-new{margin-top:16px;max-width:290px;font-size:14px;line-height:1.8;color:var(--text-soft)}
    .scroll-indicator{margin-top:36px;display:inline-flex;align-items:center;gap:10px;color:rgba(255,255,255,.58)}
    .scroll-arrow{width:10px;height:10px;border-right:2px solid rgba(255,255,255,.7);border-bottom:2px solid rgba(255,255,255,.7);transform:rotate(45deg);animation:bounceArrow 1.8s ease-in-out infinite;}
    .scroll-text{font-size:13px;letter-spacing:.08em}
    @keyframes bounceArrow{0%,100%{transform:rotate(45deg) translate(0,0)}50%{transform:rotate(45deg) translate(5px,5px)}}

    .hero-stat{padding:28px;text-align:center;overflow:hidden;position:relative;}
    .hero-stat::before{content:"";position:absolute;inset:auto -10% -40% auto;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle, rgba(192,132,252,.16), transparent 68%);}
    .stat-super{font-size:12px;color:var(--purple)}
    .stat-main,.stat-sub{font-weight:850;letter-spacing:-.04em;background:linear-gradient(135deg,var(--pink),#a78bfa,var(--blue));-webkit-background-clip:text;background-clip:text;color:transparent;}
    .stat-main{font-size:68px;margin:12px 0;}
    .stat-sub{font-size:48px;}
    .stat-note{margin-top:24px;padding:12px;border-radius:20px;background:rgba(255,255,255,.05);font-size:13px;line-height:1.7;color:var(--text-soft)}

    .reason-list{display:flex;flex-direction:column;gap:14px;}
    .reason-btn{width:100%;text-align:left;padding:18px 18px 16px;border-radius:26px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);}
    .reason-btn.active{border-color:rgba(192,132,252,.4);background:linear-gradient(135deg, rgba(192,132,252,.16), rgba(56,189,248,.09));box-shadow:0 14px 32px rgba(0,0,0,.16)}
    .reason-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;}
    .reason-tag{font-size:11px;color:var(--purple);letter-spacing:.16em;text-transform:uppercase;margin-bottom:6px;}
    .reason-title{font-size:20px;font-weight:700;}
    .reason-short{width:46%;font-size:13px;line-height:1.6;color:var(--text-soft);text-align:right;}
    .reason-detail{max-height:0;opacity:0;overflow:hidden;transition:max-height .35s ease, opacity .3s ease, margin-top .3s ease;color:rgba(255,255,255,.78);line-height:1.75;font-size:14px;}
    .reason-btn.active .reason-detail{max-height:180px;opacity:1;margin-top:14px;}

    .timeline-wrap{display:grid;gap:12px;margin-bottom:18px;}
    .timeline-btn{display:grid;grid-template-columns:auto 54px 1fr;align-items:center;gap:12px;text-align:left;}
    .timeline-dot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.24);background:transparent;transition:all .25s ease;}
    .timeline-dot.active{background:var(--purple);border-color:var(--purple);box-shadow:0 0 14px rgba(192,132,252,.6)}
    .timeline-year{font-size:15px;color:rgba(255,255,255,.84);font-weight:650;}
    .timeline-card{padding:14px 16px;border-radius:22px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);}
    .timeline-card.active{background:linear-gradient(135deg, rgba(192,132,252,.14), rgba(56,189,248,.08));border-color:rgba(192,132,252,.35)}
    .timeline-detail-card{padding:22px;border-radius:30px;background:rgba(13,10,24,.8);border:1px solid rgba(255,255,255,.08);box-shadow:var(--glow);position:relative;overflow:hidden;}
    .timeline-detail-card::before{content:"";position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle, rgba(56,189,248,.14), transparent 66%);}
    .timeline-detail-card .detail-copy{font-size:14px;line-height:1.75;margin-bottom:16px;position:relative;z-index:1;}
    .timeline-tags{display:flex;gap:12px;flex-wrap:wrap;position:relative;z-index:1;}
    .timeline-tags span{padding:4px 12px;border-radius:999px;font-size:12px;}

    .seg-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
    .seg-btn{padding:14px 10px;border-radius:22px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);display:flex;flex-direction:column;gap:8px;align-items:center;font-size:14px;}
    .progress-top{height:4px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin-bottom:18px;}
    .progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--purple),var(--blue));transition:width .45s var(--ease);}

    .map-card{padding:0;overflow:hidden;}
    .map-box{height:320px;position:relative;background:linear-gradient(180deg, rgba(14,9,28,.88), rgba(7,6,16,.96));}
    .map-box::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 50%, rgba(56,189,248,.07), transparent 42%);pointer-events:none;}
    .map-btn{position:absolute;padding:10px 12px;border-radius:999px;background:rgba(8,8,18,.46);border:1px solid rgba(255,255,255,.1);font-size:12px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
    .bubble-list{margin-top:16px;display:flex;flex-direction:column;gap:12px;}
    .bubble-card{padding:16px 18px;border-radius:22px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);line-height:1.75;animation:bubbleIn .45s var(--ease) both;}
    @keyframes bubbleIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .fan-route-line{stroke-dasharray:100;stroke-dashoffset:100;animation:drawRoute .9s ease forwards;}
    @keyframes drawRoute{to{stroke-dashoffset:0}}

    .impact-card{padding:20px;}
    .impact-scene{height:252px;border-radius:28px;position:relative;overflow:hidden;background:linear-gradient(180deg, rgba(16,12,31,.95), rgba(8,8,18,.98));border:1px solid rgba(255,255,255,.06);}
    .impact-scene::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(86,30,120,.08), transparent 40%, rgba(56,189,248,.04));pointer-events:none;}
    .city-light-wrap{position:absolute;left:10px;right:10px;bottom:26px;display:flex;align-items:flex-end;justify-content:space-between;gap:6px;}
    .city-light-bar{border-radius:8px 8px 0 0;background:linear-gradient(180deg, rgba(213,165,255,.96), rgba(109,78,186,.9) 45%, rgba(30,22,51,.96));box-shadow:0 0 20px rgba(192,132,252,.14);position:relative;transform-origin:bottom center;transition:height .18s linear, opacity .18s linear, filter .18s linear;}
    .city-light-bar::after{content:"";position:absolute;left:18%;right:18%;top:10%;height:36%;background:repeating-linear-gradient(180deg, rgba(255,234,172,.44) 0 4px, transparent 4px 8px), repeating-linear-gradient(90deg, rgba(255,234,172,.28) 0 3px, transparent 3px 7px);opacity:.75;}
    .impact-river{position:absolute;left:5%;right:5%;bottom:18px;height:20px;border-radius:999px;background:linear-gradient(90deg, rgba(56,189,248,.04), rgba(125,211,252,.36), rgba(56,189,248,.04));filter:blur(5px);transition:opacity .18s linear;}
    .impact-center-pulse{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:96px;height:96px;transition:opacity .18s linear;}
    .pulse-core{position:absolute;left:50%;top:50%;width:12px;height:12px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 18px rgba(255,255,255,.7);}
    .pulse-ring{position:absolute;inset:0;border:1px solid rgba(255,255,255,.28);border-radius:50%;animation:pulseRing 2.2s ease-out infinite;}
    .pulse-ring-2{animation-delay:1.1s;}
    @keyframes pulseRing{0%{transform:scale(.4);opacity:.7}100%{transform:scale(1.15);opacity:0}}
    .impact-crowd{position:absolute;left:10px;right:10px;bottom:0;display:flex;justify-content:space-between;align-items:flex-end;}
    .impact-person{width:6px;background:rgba(255,255,255,.3);border-radius:4px 4px 0 0;transition:height .18s linear, opacity .18s linear;}
    .impact-phase{padding:10px 12px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:12px;color:var(--text-soft);}
    .slider-container{margin-top:18px;touch-action:none;}
    .slider{height:44px;position:relative;cursor:pointer;touch-action:none;user-select:none;}
    .slider-track{position:absolute;left:12px;right:12px;top:50%;height:4px;background:rgba(255,255,255,.16);border-radius:4px;transform:translateY(-50%);pointer-events:none;}
    .slider-fill{position:absolute;top:50%;left:12px;height:4px;background:linear-gradient(90deg,var(--purple),var(--blue));border-radius:4px;transform:translateY(-50%);pointer-events:none;width:0;}
    .slider-thumb{position:absolute;top:50%;width:26px;height:26px;background:white;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 16px rgba(255,255,255,.8);cursor:grab;}
    .slider:active .slider-thumb,.slider.dragging .slider-thumb{cursor:grabbing;transform:translate(-50%,-50%) scale(1.06);}
    .impact-grid{margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .metric-card{padding:16px;border-radius:24px;background:rgba(20,16,40,.62);}
    .metric-value{font-size:28px;font-weight:780;margin-top:8px;letter-spacing:-.03em;}

    .consumption-card{padding:24px;}
    .consumption-row{margin-bottom:16px;}
    .bar-head{display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px;}
    .bar-track{height:6px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;}
    .bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));border-radius:999px;transition:width .45s var(--ease);}
    .pie-wrap{margin-top:24px;display:flex;align-items:center;gap:20px;}
    .pie{width:84px;height:84px;border-radius:50%;position:relative;}
    .pie::after{content:"";position:absolute;inset:16px;border-radius:50%;background:rgba(9,7,18,.96);box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);}

    .ending-card{padding:32px 22px;text-align:center;overflow:hidden;position:relative;}
    .ending-card::before{content:"";position:absolute;left:50%;top:-32px;transform:translateX(-50%);width:180px;height:180px;border-radius:50%;background:radial-gradient(circle, rgba(192,132,252,.18), transparent 68%);}
    .ending-text{position:relative;z-index:1;font-size:26px;font-weight:520;line-height:1.65;min-height:88px;display:flex;align-items:center;justify-content:center;transition:opacity .28s ease, transform .28s ease;}
    .ending-text.swap{opacity:0;transform:translateY(8px)}
    .ghost-btn{margin-top:28px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.05);border-radius:60px;padding:12px 28px;}

    .page-enter .animate-rise{opacity:0;transform:translateY(20px);animation:riseFade .8s var(--ease) forwards;}
    .page-enter .animate-rise.d2{animation-delay:.08s}
    .page-enter .animate-rise.d3{animation-delay:.16s}
    .page-enter .animate-rise.d4{animation-delay:.24s}
    .page-enter .animate-fade{opacity:0;animation:fadeIn .9s ease forwards;}
    .page-enter .animate-scale{opacity:0;transform:scale(.96);animation:scaleIn .85s var(--ease) forwards;}
    @keyframes riseFade{to{opacity:1;transform:none}}
    @keyframes fadeIn{to{opacity:1}}
    @keyframes scaleIn{to{opacity:1;transform:none}}

    @media (hover:hover){
      .chip:hover,.seg-btn:hover,.map-btn:hover,.impact-phase:hover,.ghost-btn:hover,.reason-btn:hover{transform:translateY(-2px)}
      .dot:hover{transform:scale(1.16)}
      .music-control:hover{transform:translateY(-2px)}
    }

    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{animation:none !important;transition:none !important;scroll-behavior:auto !important;}
      .page,.pages{transition:none !important}
    }

    @supports not ((backdrop-filter: blur(10px)) or (-webkit-backdrop-filter: blur(10px))){
      .card,.music-control,.page-counter,.map-btn{background:rgba(12,10,20,.92)}
    }

    @media (max-width: 380px){
      .title{font-size:28px}
      .cover-title-new{font-size:48px}
      .stat-main{font-size:58px}
      .stat-sub{font-size:42px}
      .map-box{height:292px}
    }
  

    /* Black-led premium background, lifted from pure black */
    :root{
      --bg:#0f0b16;
      --bg-soft:#191324;
      --card:rgba(29,22,43,0.66);
      --line:rgba(255,255,255,0.08);
      --text:rgba(249,245,255,0.97);
      --text-soft:rgba(228,220,242,0.76);
      --text-faint:rgba(228,220,242,0.44);
      --purple:#a855f7;
      --pink:#ec4899;
      --blue:#60a5fa;
      --cyan:#7dd3fc;
      --gold:#f3dfb2;
      --glow:0 24px 54px rgba(0,0,0,0.24);
    }
    body{
      background:
        radial-gradient(ellipse at 18% 12%, rgba(168,85,247,0.20), transparent 34%),

  function rerenderPage(index) {
    const page = pagesEl.querySelector(`.page[data-page="${index}"]`);

  function syncPageState() {
    const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
    pagesEl.style.transform = `translateY(-${state.page * viewportHeight}px)`;
    pagesEl.querySelectorAll('.page').forEach((page, index) => {
      page.classList.remove('is-before','is-after','is-active');
      page.classList.add(index === state.page ? 'is-active' : index < state.page ? 'is-before' : 'is-after');
    });
    dotNavEl.querySelectorAll('.dot').forEach((dot, index) => dot.classList.toggle('active', index === state.page));
    pageCounterEl.textContent = `${String(state.page + 1).padStart(2,'0')} / 09`;
    if (chapterSheetEl.innerHTML) renderChapterSheet();
  }

    if (next < 0 || next >= pageCount) return;

    playPageSound();

  function syncImpactScene(force = false) {
    const slider = document.getElementById('impactSlider');
    const fill = document.getElementById('sliderFill');
    const thumb = document.getElementById('sliderThumb');
    const bars = [...document.querySelectorAll('#impactBars .city-light-bar')];
    const crowd = [...document.querySelectorAll('#impactCrowd .impact-person')];
    const river = document.getElementById('impactRiver');
    const pulse = document.getElementById('impactPulse');
    const hotelEl = document.getElementById('metricHotel');
    const diningEl = document.getElementById('metricDining');
    const visitorsEl = document.getElementById('metricVisitors');
    const phases = [...document.querySelectorAll('.impact-phase')];
    if (!slider || !fill || !thumb || !bars.length || !crowd.length) return;

    const p = Math.max(0, Math.min(1, state.impactProgress));
    const rect = slider.getBoundingClientRect();
    const usableWidth = Math.max(0, rect.width - 24);
    fill.style.width = `${usableWidth * p}px`;
    thumb.style.left = `${12 + usableWidth * p}px`;

    bars.forEach((bar, i) => {
      const base = Number(bar.dataset.base || 24);
      const variance = Number(bar.dataset.variance || 10);
      const wave = Math.sin((p * Math.PI * 2) + i * 0.55) * 5;
      const delayBoost = p * (18 + variance) * (0.7 + (i % 3) * 0.18);
      bar.style.height = `${Math.round(base + delayBoost + wave)}px`;
      bar.style.opacity = `${0.24 + p * 0.76}`;
      bar.style.filter = `brightness(${0.88 + p * 0.42})`;
    });

    crowd.forEach((person, i) => {
      const base = Number(person.dataset.base || 18);
      const variance = Number(person.dataset.variance || 10);
      const wave = Math.sin((p * 7) + i * 0.8) * 4;
      person.style.height = `${Math.round(base + p * variance + wave + 6)}px`;
      person.style.opacity = `${0.26 + p * 0.68}`;
    });

    if (river) river.style.opacity = `${0.26 + p * 0.74}`;
    if (pulse) pulse.style.opacity = `${0.22 + p * 0.78}`;

    const metrics = getImpactMetrics(p);
    if (hotelEl) hotelEl.textContent = `${metrics.hotel}%`;
    if (diningEl) diningEl.textContent = `+${metrics.dining}%`;
    if (visitorsEl) visitorsEl.textContent = `${metrics.visitors}x`;

    phases.forEach(btn => {
      const target = Number(btn.dataset.progress);
      const active = (target === 0.2 && p < 0.5) || (target === 0.5 && p >= 0.5 && p < 0.85) || (target === 0.85 && p >= 0.85);
      btn.classList.toggle('active', active);
    });
  }

  function setImpactProgress(next, withSound = true) {
    const p = Math.round(Math.max(0, Math.min(1, next)) * 100) / 100;
    if (Math.abs(p - state.impactProgress) < 0.005) return;
    state.impactProgress = p;
    if (sliderRAF) cancelAnimationFrame(sliderRAF);
    sliderRAF = requestAnimationFrame(() => syncImpactScene());
    if (withSound) playSliderTone(p);
  }

  function updateImpactFromClientX(clientX) {
    const slider = document.getElementById('impactSlider');
    if (!slider) return;
    const rect = slider.getBoundingClientRect();
    const p = (clientX - rect.left - 12) / Math.max(1, rect.width - 24);
    setImpactProgress(p, true);
  }


  let sliderToneLast = 0;

  function initAudio() {
    if (audioCtx) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    audioCtx = new Ctx();
  }

  function createReverbImpulse(ctx, seconds = 2.2, decay = 2.4) {
    const length = Math.max(1, Math.floor(ctx.sampleRate * seconds));
    const impulse = ctx.createBuffer(2, length, ctx.sampleRate);
    for (let channel = 0; channel < 2; channel++) {
      const data = impulse.getChannelData(channel);
      for (let i = 0; i < length; i++) {
        const n = 1 - i / length;
        data[i] = (Math.random() * 2 - 1) * Math.pow(n, decay) * 0.18;
      }
    }
    return impulse;
  }

  function playAmbientNote(freq, when, duration, volume = 0.02, pan = 0) {
    if (!audioCtx || !bgmNodes.bus) return;
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    const panner = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;

    osc1.type = 'triangle';
    osc2.type = 'sine';
    osc1.frequency.setValueAtTime(freq, when);
    osc2.frequency.setValueAtTime(freq * 2, when);

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(1200, when);
    filter.Q.setValueAtTime(0.7, when);

    gain.gain.setValueAtTime(0.0001, when);
    gain.gain.linearRampToValueAtTime(volume, when + Math.min(0.65, duration * 0.45));
    gain.gain.exponentialRampToValueAtTime(0.0001, when + duration);

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(filter);
    if (panner) {
      panner.pan.setValueAtTime(pan, when);
      filter.connect(panner);
      panner.connect(bgmNodes.bus);
    } else {
      filter.connect(bgmNodes.bus);
    }

    osc1.start(when);
    osc2.start(when);
    osc1.stop(when + duration + 0.08);
    osc2.stop(when + duration + 0.08);
  }

  function scheduleAmbientBar() {
    if (!audioCtx || !bgmNodes.master) return;
    const chords = [
      [220.00, 329.63, 392.00],
      [196.00, 293.66, 392.00],
      [174.61, 261.63, 349.23],
      [164.81, 246.94, 329.63]
    ];
    const chord = chords[bgmNodes.step % chords.length];
    const t = audioCtx.currentTime + 0.06;
    playAmbientNote(chord[0], t, 2.2, 0.026, 0);
    playAmbientNote(chord[1], t + 0.34, 1.5, 0.015, -0.22);
    playAmbientNote(chord[2], t + 0.92, 1.45, 0.013, 0.22);
    playAmbientNote(chord[1] * 2, t + 1.46, 0.9, 0.0065, 0.1);
    bgmNodes.step += 1;
  }

  function startMusic() {
    if (!audioCtx || bgmNodes.gain) return;
    const t = audioCtx.currentTime;
    const master = audioCtx.createGain();
    const bus = audioCtx.createGain();
    const tone = audioCtx.createBiquadFilter();
    const dry = audioCtx.createGain();
    const wet = audioCtx.createGain();
    const reverb = audioCtx.createConvolver();

    master.gain.setValueAtTime(0.0001, t);
    master.gain.linearRampToValueAtTime(0.12, t + 1.8);
    bus.gain.setValueAtTime(1, t);
    tone.type = 'lowpass';
    tone.frequency.setValueAtTime(1450, t);
    tone.Q.setValueAtTime(0.5, t);
    dry.gain.setValueAtTime(0.92, t);
    wet.gain.setValueAtTime(0.22, t);
    reverb.buffer = createReverbImpulse(audioCtx);

    bus.connect(tone);
    tone.connect(dry);
    tone.connect(reverb);
    reverb.connect(wet);
    dry.connect(master);
    wet.connect(master);
    master.connect(audioCtx.destination);

    bgmNodes = { gain: master, master, bus, tone, dry, wet, reverb, step: 0, timer: null };
    scheduleAmbientBar();
    bgmNodes.timer = setInterval(scheduleAmbientBar, 2400);
  }

  function stopMusic() {
    if (!audioCtx || !bgmNodes.gain) return;
    const currentNodes = bgmNodes;
    const t = audioCtx.currentTime;
    currentNodes.gain.gain.cancelScheduledValues(t);
    currentNodes.gain.gain.setValueAtTime(currentNodes.gain.gain.value, t);
    currentNodes.gain.gain.linearRampToValueAtTime(0.0001, t + 0.9);
    if (currentNodes.timer) clearInterval(currentNodes.timer);
    setTimeout(() => {
      try { currentNodes.master?.disconnect(); } catch (_) {}
      try { currentNodes.bus?.disconnect(); } catch (_) {}
      try { currentNodes.reverb?.disconnect(); } catch (_) {}
      bgmNodes = { osc1:null, osc2:null, gain:null, lfo:null, lfoGain:null, master:null, bus:null, tone:null, dry:null, wet:null, reverb:null, step:0, timer:null };
    }, 1050);
  }

  function ensureAudioAndResume() {
    initAudio();
    if (audioCtx?.state === 'suspended') audioCtx.resume();
  }

  function playSoftTone(freq, duration = 0.16, peak = 0.018, type = 'sine', drift = 1.12) {
    ensureAudioAndResume();
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * drift, t + duration * 0.8);
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(1500, t);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.linearRampToValueAtTime(peak, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + duration + 0.02);
  }

  function playClick() {
    playSoftTone(540, 0.14, 0.014, 'sine', 1.06);
  }

  function playPageSound() {
    playSoftTone(420, 0.24, 0.012, 'triangle', 1.22);
  }

  function playSliderTone(p) {
    ensureAudioAndResume();
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    if (now - sliderToneLast < 0.09) return;
    sliderToneLast = now;
    playSoftTone(300 + p * 120, 0.1, 0.006, 'sine', 1.02);
  }

  function toggleMusic() {
    ensureAudioAndResume();
    if (!audioCtx) return;
    if (!musicEnabled) {
      musicEnabled = true;
      startMusic();
      musicControlEl.classList.add('playing');
      musicControlEl.setAttribute('aria-label', '关闭音乐');
      playClick();
    } else {
      musicEnabled = false;
      stopMusic();
      musicControlEl.classList.remove('playing');
      musicControlEl.setAttribute('aria-label', '开启音乐');
    }
  }

  function bindGlobalEvents() {
    app.addEventListener('click', (e) => {
      const target = e.target.closest('[data-action]');
      if (!target) return;
      const action = target.dataset.action;
      switch (action) {
        case 'go-page': toggleChapterSheet(false); goToPage(Number(target.dataset.index)); break;
        case 'close-chapters': toggleChapterSheet(false); break;
        case 'data-mode': updateDataMode(target.dataset.value); break;
        case 'reason': updateReason(Number(target.dataset.index)); break;
        case 'timeline': updateTimeline(Number(target.dataset.index)); break;
        case 'backstage': updateBackstage(Number(target.dataset.index)); break;
        case 'fan-city': toggleFanCity(target.dataset.value); break;
        case 'impact-phase': setImpactProgress(parseFloat(target.dataset.progress), false); syncImpactScene(); playClick(); break;
        case 'consumption-mode': updateConsumptionMode(target.dataset.value); break;
        case 'ending-toggle': toggleEnding(); break;
      }
    });

    musicControlEl.addEventListener('click', toggleMusic);
    pageCounterEl.addEventListener('click', () => toggleChapterSheet());
    chapterScrimEl.addEventListener('click', () => toggleChapterSheet(false));

    window.addEventListener('wheel', (e) => {
      if (state.wheelLocked || state.draggingSlider) return;
      state.wheelLocked = true;
      if (e.deltaY > 0) goToPage(Math.min(pageCount - 1, state.page + 1));
      else goToPage(Math.max(0, state.page - 1));
      setTimeout(() => { state.wheelLocked = false; }, 800);
    }, { passive: true });

    app.addEventListener('touchstart', (e) => {
      const slider = e.target.closest('#impactSlider');
      if (slider) {
        state.draggingSlider = true;
        slider.classList.add('dragging');
        updateImpactFromClientX(e.touches[0].clientX);
        return;
      }
      state.touchStartY = e.touches[0].clientY;
      state.touchStartX = e.touches[0].clientX;
      state.touchAxis = null;
    }, { passive: true });

    app.addEventListener('touchmove', (e) => {
      if (state.draggingSlider) {
        updateImpactFromClientX(e.touches[0].clientX);
        return;
      }
      if (state.touchStartY == null || state.touchStartX == null) return;
      const dx = e.touches[0].clientX - state.touchStartX;
      const dy = e.touches[0].clientY - state.touchStartY;
      if (!state.touchAxis && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
        state.touchAxis = Math.abs(dy) >= Math.abs(dx) ? 'y' : 'x';
      }
    }, { passive: true });

    app.addEventListener('touchend', (e) => {
      const slider = document.getElementById('impactSlider');
      if (state.draggingSlider) {
        state.draggingSlider = false;
        slider?.classList.remove('dragging');
        return;
      }
      if (state.touchStartY == null || state.touchStartX == null) return;
      const dy = state.touchStartY - e.changedTouches[0].clientY;
      const dx = e.changedTouches[0].clientX - state.touchStartX;
      if (state.touchAxis === 'y' && Math.abs(dy) > 42 && Math.abs(dy) > Math.abs(dx) * 1.15) {
        if (dy > 0) goToPage(Math.min(pageCount - 1, state.page + 1));
        else goToPage(Math.max(0, state.page - 1));
      }
      state.touchStartY = null;
      state.touchStartX = null;
      state.touchAxis = null;
    }, { passive: true });

    app.addEventListener('pointerdown', (e) => {
      const slider = e.target.closest('#impactSlider');
      if (!slider) return;
      state.draggingSlider = true;
      slider.classList.add('dragging');
      slider.setPointerCapture?.(e.pointerId);
      updateImpactFromClientX(e.clientX);
    });

    app.addEventListener('pointermove', (e) => {
      if (!state.draggingSlider) return;
      updateImpactFromClientX(e.clientX);
    });

    app.addEventListener('pointerup', (e) => {
      if (!state.draggingSlider) return;
      state.draggingSlider = false;
      document.getElementById('impactSlider')?.classList.remove('dragging');
    });

    window.addEventListener('resize', () => {
      syncPageState();
      if (state.page === 6) syncImpactScene(true);
    });

    const initFirst = () => {
      ensureAudioAndResume();
      document.removeEventListener('touchstart', initFirst);
      document.removeEventListener('pointerdown', initFirst);
    };
    document.addEventListener('touchstart', initFirst, { passive: true });
    document.addEventListener('pointerdown', initFirst, { passive: true });
  }

  function bindDepthInteraction() {
    const updateDepth = (clientX, clientY) => {
      const x = ((clientX / Math.max(1, window.innerWidth)) - 0.5) * 10;
      const y = ((clientY / Math.max(1, window.innerHeight)) - 0.5) * 10;
      const activeFrame = pagesEl.querySelector('.page.is-active .mobile-frame');
      pagesEl.querySelectorAll('.mobile-frame').forEach(frame => frame.classList.remove('has-depth'));
      if (!activeFrame || window.innerWidth > 900) return;
      activeFrame.classList.add('has-depth');
      activeFrame.style.setProperty('--depth-x', `${x * -0.5}px`);
      activeFrame.style.setProperty('--depth-y', `${y * -0.38}px`);
    };

    app.addEventListener('pointermove', (e) => {
      if (state.draggingSlider || e.pointerType === 'touch') return;
      updateDepth(e.clientX, e.clientY);
    });

    app.addEventListener('touchmove', (e) => {
      if (state.draggingSlider || state.touchAxis === 'y') return;
      const t = e.touches[0];
      if (!t) return;
      updateDepth(t.clientX, t.clientY);
    }, { passive: true });

    app.addEventListener('pointerleave', () => {
      pagesEl.querySelectorAll('.mobile-frame').forEach(frame => {
        frame.classList.remove('has-depth');
        frame.style.setProperty('--depth-x', '0px');
        frame.style.setProperty('--depth-y', '0px');
      });
    });
  }

  renderStatic();
  bindGlobalEvents();
  bindDepthInteraction();
})();
</script>
</body>
</html>
